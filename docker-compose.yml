services:
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - CORS_ORIGIN=http://localhost:8501
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/states"]
      interval: 15s
      timeout: 5s
      retries: 5

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
    ports:
      - "8501:8501"
    environment:
      - API_BASE=http://server:3001/api
    depends_on:
      server:
        condition: service_healthy
